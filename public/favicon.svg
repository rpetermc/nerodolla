<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Monero-orange rounded square -->
  <rect width="64" height="64" rx="14" fill="#ff6600"/>

  <!--
    Monero-style N mark — three white shapes:
      Left arm  : rect  x=4–16,  y=6–58  (vertical, full height)
      Diagonal  : parallelogram (16,6)→(28,6)→(48,58)→(36,58)
                  12 px wide, sweeps top-left to bottom-right
      Right arm : rect  x=48–60, y=6–58  (vertical, full height)
  -->
  <rect    x="4"  y="6" width="12" height="52" fill="white"/>
  <polygon points="16,6 28,6 48,58 36,58"       fill="white"/>
  <rect    x="48" y="6" width="12" height="52" fill="white"/>
</svg>
