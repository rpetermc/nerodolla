<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="c"><circle cx="32" cy="32" r="32"/></clipPath>
  </defs>

  <!-- Thin white border so logo stands out on white backgrounds -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="white" stroke-width="2"/>

  <!-- Monero-orange circle background -->
  <circle cx="32" cy="32" r="31" fill="#ff6600"/>

  <g clip-path="url(#c)">
    <!-- Grey region: right & bottom of the N -->
    <polygon points="22,10 52,54 52,10 64,10 64,64 0,64 0,46 22,46" fill="#2d2d2d"/>

    <!-- White N (10px strokes) -->
    <rect    x="12" y="10" width="10" height="44" fill="white"/>
    <polygon points="12,10 22,10 52,54 42,54"     fill="white"/>
    <rect    x="42" y="10" width="10" height="44" fill="white"/>
    <!-- Left cap: extends to circle edge (clip-path trims cleanly) -->
    <rect    x="0"  y="46" width="22" height="8"  fill="white"/>
    <!-- Right cap: extends to circle edge (clip-path trims cleanly) -->
    <rect    x="42" y="10" width="22" height="8"  fill="white"/>
  </g>
</svg>
